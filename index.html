<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Locklet Pro — Secure Digital Document Storage</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #06050a;
      --s1: #0d0b12;
      --s2: #12101a;
      --s3: #1a1726;
      --s4: #221f30;
      --border: rgba(255,255,255,0.055);
      --border-hi: rgba(255,255,255,0.10);
      --border-gold: rgba(232,184,109,0.22);
      --gold: #e8b86d;
      --gold2: #f5d08a;
      --gold-dim: rgba(232,184,109,0.08);
      --violet: #9b6dff;
      --violet2: #b89eff;
      --violet-dim: rgba(155,109,255,0.08);
      --green: #4eca8b;
      --green-dim: rgba(78,202,139,0.08);
      --red: #ff6b6b;
      --text: #f0eaf8;
      --t2: #7a7290;
      --t3: #35304a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Instrument Sans',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      cursor:default;
    }

    /* ── Noise grain overlay ── */
    body::before{
      content:'';
      position:fixed;inset:0;z-index:999;
      pointer-events:none;
      opacity:.028;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size:200px 200px;
    }

    /* ── Background orbs ── */
    .bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(110px);animation:drift 18s ease-in-out infinite}
    .orb-a{width:700px;height:700px;background:radial-gradient(circle,rgba(155,109,255,.11),transparent 65%);top:-250px;left:-200px;animation-delay:0s}
    .orb-b{width:500px;height:500px;background:radial-gradient(circle,rgba(232,184,109,.08),transparent 65%);top:30%;right:-180px;animation-delay:-6s}
    .orb-c{width:380px;height:380px;background:radial-gradient(circle,rgba(78,202,139,.05),transparent 65%);bottom:0%;left:10%;animation-delay:-11s}
    .orb-d{width:280px;height:280px;background:radial-gradient(circle,rgba(232,184,109,.06),transparent 65%);top:60%;left:40%;animation-delay:-4s}
    @keyframes drift{
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(30px,-22px) scale(1.04)}
      66%{transform:translate(-18px,28px) scale(.97)}
    }

    /* ── Grid ── */
    .grid-bg{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse 85% 65% at 50% 0%,black 20%,transparent 100%);
    }

    /* ── Scanline effect ── */
    .scanlines{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
    }

    /* ── Layout ── */
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 20px 80px}

    /* ── Nav ── */
    nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:24px 0 20px;
      animation:slideDown .8s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .gem{
      width:36px;height:36px;
      background:linear-gradient(135deg,#f0c97a,#b8722a 60%,#7a3d00);
      border-radius:11px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 22px rgba(232,184,109,.35),0 4px 14px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.22);
      position:relative;overflow:hidden;
      transition:transform .2s, box-shadow .2s;
    }
    .gem:hover{transform:scale(1.08) rotate(-3deg);box-shadow:0 0 32px rgba(232,184,109,.5),0 6px 20px rgba(0,0,0,.5)}
    .gem::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 50%);border-radius:inherit}
    .gem svg{width:17px;height:17px;fill:#fff;position:relative;z-index:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
    .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.03em;color:var(--text)}
    .logo-name em{font-style:normal;color:var(--gold)}

    .nav-right{display:flex;align-items:center;gap:8px}
    .status-pill{
      display:flex;align-items:center;gap:6px;
      background:rgba(78,202,139,.07);
      border:1px solid rgba(78,202,139,.2);
      border-radius:20px;padding:6px 13px;
      font-size:11px;font-weight:500;color:var(--green);letter-spacing:.04em;
    }
    .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}

    /* ── Hero ── */
    .hero{padding:36px 0 32px;animation:up .8s cubic-bezier(.16,1,.3,1) .1s both}
    @keyframes up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

    .eyebrow{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid rgba(232,184,109,.2);
      background:rgba(232,184,109,.055);
      border-radius:30px;padding:5px 14px 5px 7px;
      font-size:10px;font-weight:600;color:var(--gold);
      letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;
      backdrop-filter:blur(4px);
    }
    .eyebrow-icon{
      width:18px;height:18px;
      background:linear-gradient(135deg,rgba(232,184,109,.25),rgba(232,184,109,.1));
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(232,184,109,.25);
    }
    .eyebrow-icon svg{width:9px;height:9px;fill:var(--gold)}

    h1{
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:clamp(36px,9vw,52px);
      line-height:1.03;letter-spacing:-.045em;margin-bottom:14px;
    }
    .grad{
      background:linear-gradient(100deg,var(--gold2) 0%,var(--gold) 35%,var(--violet) 75%,var(--violet2) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:shimmer 6s ease-in-out infinite;
      background-size:200% auto;
    }
    @keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:100% center}}

    .hero-desc{font-size:14px;color:var(--t2);line-height:1.78;font-weight:300;max-width:360px;margin-bottom:28px}

    /* ── Stats row ── */
    .stats-row{
      display:flex;gap:0;
      background:var(--s1);border:1px solid var(--border);
      border-radius:16px;overflow:hidden;margin-bottom:28px;
      animation:up .8s cubic-bezier(.16,1,.3,1) .18s both;
    }
    .stat{
      flex:1;padding:14px 16px;text-align:center;
      border-right:1px solid var(--border);position:relative;
      transition:background .2s;
    }
    .stat:last-child{border-right:none}
    .stat:hover{background:var(--s2)}
    .stat-n{
      font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
      color:var(--gold);letter-spacing:-.03em;display:block;line-height:1;margin-bottom:3px;
    }
    .stat-l{font-size:9.5px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;font-weight:500}

    /* ── Play Store Button ── */
    .play-wrap{animation:up .8s cubic-bezier(.16,1,.3,1) .22s both;margin-bottom:10px}
    .play-btn{
      display:inline-flex;align-items:center;gap:14px;
      background:linear-gradient(135deg,rgba(15,13,22,.95) 0%,rgba(20,17,32,.95) 100%);
      border:1px solid var(--border-gold);
      border-radius:16px;padding:14px 20px;
      text-decoration:none;position:relative;overflow:hidden;
      transition:transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s, border-color .25s;
      box-shadow:0 6px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
      width:100%;
      backdrop-filter:blur(10px);
    }
    .play-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(100deg,rgba(232,184,109,.06) 0%,rgba(155,109,255,.04) 100%);
      opacity:0;transition:opacity .25s;
    }
    .play-btn::after{
      content:'';position:absolute;
      top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
      transition:left .5s ease;
    }
    .play-btn:hover{
      transform:translateY(-3px) scale(1.005);
      border-color:rgba(232,184,109,.45);
      box-shadow:0 14px 44px rgba(0,0,0,.6),0 0 28px rgba(232,184,109,.1),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .play-btn:hover::before{opacity:1}
    .play-btn:hover::after{left:150%}
    .play-btn:active{transform:translateY(-1px) scale(1)}

    /* Play Store Icon */
    .ps-icon-wrap{
      width:46px;height:46px;flex-shrink:0;
      background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
      position:relative;overflow:hidden;
    }
    .ps-icon-wrap::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.06),transparent);
    }
    .ps-icon-wrap svg{width:24px;height:24px;position:relative;z-index:1}

    .play-text-col{flex:1;display:flex;flex-direction:column;gap:2px}
    .play-sub-label{font-size:9px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;font-weight:500}
    .play-main-label{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text);letter-spacing:-.02em;line-height:1.1}

    .play-badge{
      display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;
    }
    .play-rating{
      display:flex;align-items:center;gap:4px;
      background:rgba(232,184,109,.1);border:1px solid rgba(232,184,109,.2);
      border-radius:8px;padding:4px 8px;
    }
    .play-rating svg{width:11px;height:11px;fill:var(--gold)}
    .play-rating-n{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--gold)}
    .play-open-label{font-size:9px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase}

    /* Testing badge */
    .testing-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(155,109,255,.08);border:1px solid rgba(155,109,255,.2);
      border-radius:8px;padding:5px 11px;
      font-size:10px;color:var(--violet2);font-weight:500;letter-spacing:.04em;
      margin-top:8px;
    }
    .testing-badge svg{width:10px;height:10px;fill:var(--violet)}

    /* ── Section label ── */
    .section-label{
      font-size:9.5px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;
      font-weight:600;margin:22px 0 10px;padding-left:2px;
    }

    /* ── Cards ── */
    .card{
      background:var(--s1);
      border:1px solid var(--border);
      border-radius:22px;overflow:hidden;margin-bottom:10px;
      transition:border-color .3s,transform .3s,box-shadow .3s;
      animation:up .8s cubic-bezier(.16,1,.3,1) both;
      position:relative;
    }
    .card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 60%);
      pointer-events:none;border-radius:inherit;
    }
    .card:hover{
      border-color:rgba(232,184,109,.16);
      transform:translateY(-3px);
      box-shadow:0 20px 56px rgba(0,0,0,.55),0 0 0 1px rgba(232,184,109,.05);
    }
    .card:nth-child(1){animation-delay:.12s}.card:nth-child(2){animation-delay:.18s}
    .card:nth-child(3){animation-delay:.24s}.card:nth-child(4){animation-delay:.30s}
    .card:nth-child(5){animation-delay:.36s}

    .ct{
      display:flex;align-items:center;gap:12px;
      padding:16px 20px;border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.014);
    }
    .ci{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ci svg{width:15px;height:15px}
    .ci.g{background:linear-gradient(135deg,rgba(232,184,109,.15),rgba(232,184,109,.06));border:1px solid rgba(232,184,109,.22)}.ci.g svg{fill:var(--gold)}
    .ci.v{background:linear-gradient(135deg,rgba(155,109,255,.15),rgba(155,109,255,.06));border:1px solid rgba(155,109,255,.22)}.ci.v svg{fill:var(--violet)}
    .ci.gr{background:linear-gradient(135deg,rgba(78,202,139,.15),rgba(78,202,139,.06));border:1px solid rgba(78,202,139,.22)}.ci.gr svg{fill:var(--green)}
    .cl{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;letter-spacing:-.015em;color:var(--text);flex:1}
    .ct-badge{font-size:9px;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;font-weight:500;background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:3px 7px}

    .cb{padding:18px 20px}
    .cb p{font-size:13.5px;color:var(--t2);line-height:1.78;font-weight:300}

    /* ── App mockup card ── */
    .mockup-card{
      background:linear-gradient(160deg,var(--s1) 0%,rgba(155,109,255,.04) 100%);
      border:1px solid var(--border);border-radius:22px;
      padding:20px;margin-bottom:10px;overflow:hidden;position:relative;
      animation:up .8s cubic-bezier(.16,1,.3,1) .08s both;
    }
    .mockup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .mockup-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text)}
    .mockup-sub{font-size:10px;color:var(--t2);font-weight:300}
    .mock-phone{
      background:var(--s2);border:1px solid var(--border-hi);border-radius:18px;
      padding:14px;position:relative;overflow:hidden;
    }
    .mock-phone::before{
      content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:60px;height:4px;background:var(--s4);border-radius:0 0 4px 4px;
    }
    .mock-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-top:6px}
    .mock-time{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text)}
    .mock-icons{display:flex;gap:5px}
    .mock-icons span{width:10px;height:10px;border-radius:50%;display:block}
    .mock-icons .mi1{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2.2s ease infinite}
    .mock-icons .mi2{background:rgba(255,255,255,.2)}
    .mock-icons .mi3{background:rgba(255,255,255,.12)}

    .mock-search{
      display:flex;align-items:center;gap:8px;
      background:var(--s3);border:1px solid var(--border-hi);
      border-radius:10px;padding:9px 12px;margin-bottom:12px;
    }
    .mock-search svg{width:12px;height:12px;fill:var(--t3);flex-shrink:0}
    .mock-search span{font-size:11px;color:var(--t3);font-weight:300}

    .doc-row{
      display:flex;align-items:center;gap:10px;
      background:var(--s3);border:1px solid var(--border);
      border-radius:10px;padding:10px 12px;margin-bottom:7px;
      transition:border-color .2s,background .2s;
      animation:slideInRow .5s cubic-bezier(.16,1,.3,1) both;
    }
    .doc-row:nth-child(1){animation-delay:.3s}
    .doc-row:nth-child(2){animation-delay:.42s}
    .doc-row:nth-child(3){animation-delay:.54s}
    .doc-row:last-child{margin-bottom:0}
    @keyframes slideInRow{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
    .doc-icon{
      width:30px;height:30px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;flex-shrink:0;
    }
    .doc-icon.aa{background:linear-gradient(135deg,rgba(232,184,109,.2),rgba(232,184,109,.08));border:1px solid rgba(232,184,109,.2)}
    .doc-icon.bb{background:linear-gradient(135deg,rgba(155,109,255,.2),rgba(155,109,255,.08));border:1px solid rgba(155,109,255,.2)}
    .doc-icon.cc{background:linear-gradient(135deg,rgba(78,202,139,.2),rgba(78,202,139,.08));border:1px solid rgba(78,202,139,.2)}
    .doc-info{flex:1}
    .doc-name{font-size:11.5px;font-weight:500;color:var(--text);margin-bottom:2px}
    .doc-meta{font-size:9.5px;color:var(--t2);font-weight:300}
    .doc-lock{
      width:20px;height:20px;border-radius:6px;
      background:var(--green-dim);border:1px solid rgba(78,202,139,.2);
      display:flex;align-items:center;justify-content:center;
    }
    .doc-lock svg{width:10px;height:10px;fill:var(--green)}

    /* ── Feature grid ── */
    .feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fi{
      background:var(--s2);border:1px solid var(--border);
      border-radius:13px;padding:13px 14px;
      transition:border-color .2s,background .2s,transform .2s;
      position:relative;overflow:hidden;
    }
    .fi::before{
      content:'';position:absolute;top:0;right:0;
      width:40px;height:40px;
      background:radial-gradient(circle,rgba(232,184,109,.05),transparent 70%);
      pointer-events:none;
    }
    .fi:hover{border-color:rgba(232,184,109,.16);background:var(--s3);transform:translateY(-2px)}
    .fi-em{font-size:19px;margin-bottom:7px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
    .fi-t{font-size:11.5px;color:var(--t2);line-height:1.45;font-weight:400}
    .fi-t strong{color:var(--text);font-weight:500;display:block;margin-bottom:2px;font-size:12px}

    /* ── Plan ── */
    .plan-banner{
      background:linear-gradient(135deg,rgba(232,184,109,.08),rgba(155,109,255,.05));
      border:1px solid rgba(232,184,109,.16);border-radius:14px;
      padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:13px;
      position:relative;overflow:hidden;
    }
    .plan-banner::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:120px;height:120px;
      background:radial-gradient(circle,rgba(232,184,109,.08),transparent 70%);
      pointer-events:none;
    }
    .pi{
      width:42px;height:42px;
      background:linear-gradient(135deg,var(--gold2),#b8722a);
      border-radius:12px;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      box-shadow:0 4px 14px rgba(232,184,109,.28),inset 0 1px 0 rgba(255,255,255,.2);
    }
    .pi svg{width:20px;height:20px;fill:#fff;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
    .pm{flex:1}
    .pn{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);margin-bottom:2px}
    .ps{font-size:11px;color:var(--t2);font-weight:300}
    .pp{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--gold);letter-spacing:-.03em}
    .pp span{font-size:11px;font-weight:400;color:var(--t2)}
    .perk-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .perk{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--t2);font-weight:300}
    .pck{
      width:18px;height:18px;border-radius:6px;
      background:var(--green-dim);border:1px solid rgba(78,202,139,.2);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .pck svg{width:10px;height:10px;fill:var(--green)}
    .btn-soon{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--s3),var(--s4));
      border:1px solid var(--border-hi);border-radius:12px;
      font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
      color:var(--t2);letter-spacing:.03em;cursor:default;
      display:flex;align-items:center;justify-content:center;gap:8px
