<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "____",
    authDomain: "locklet-pro.firebaseapp.com",
    projectId: "locklet-pro",
    storageBucket: "locklet-pro.firebasestorage.app",
    messagingSenderId: "___",
    appId: "1:544340578246:web:2f41e50a81b316ba352cc7",
    measurementId: "G-G519NJCMTY"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get("oobCode");

  window.submitReset = async function () {
    const newPass = document.getElementById("newPass").value;
    const confirmPass = document.getElementById("confirmPass").value;
    if (newPass !== confirmPass) return;
    const btn = document.getElementById("submitBtn");
    btn.classList.add("loading");
    btn.disabled = true;
    try {
      await confirmPasswordReset(auth, oobCode, newPass);
      showSuccess();
    } catch (err) {
      btn.classList.remove("loading");
      btn.disabled = false;
      let msg = "Something went wrong. Please try again.";
      if (err.code === "auth/expired-action-code") msg = "This reset link has expired. Please request a new one.";
      if (err.code === "auth/invalid-action-code") msg = "Invalid reset link. Please request a new one.";
      if (err.code === "auth/weak-password") msg = "Password is too weak. Please choose a stronger password.";
      showError(msg);
    }
  };

  function showError(msg) {
    const banner = document.getElementById("errorBanner");
    banner.querySelector(".error-text").textContent = msg;
    banner.classList.add("visible","shake");
    setTimeout(() => banner.classList.remove("shake"), 600);
    document.getElementById("mainForm").style.opacity = "0.45";
    document.getElementById("mainForm").style.pointerEvents = "none";
  }

  function showSuccess() {
    const card = document.getElementById("mainCard");
    card.style.animation = "cardOut 0.6s cubic-bezier(0.4,0,1,1) forwards";
    setTimeout(() => {
      card.style.display = "none";
      const sc = document.getElementById("successCard");
      sc.style.display = "flex";
      requestAnimationFrame(() => { sc.classList.add("visible"); startConfetti(); });
    }, 600);
  }
<\/script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ── CARD WRAP ── */
.card-wrap {
  position: relative; z-index: 10; width: 100%; max-width: 472px;
}

/* ── CARD ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.25rem 2.25rem 1.75rem;
  backdrop-filter: blur(48px) saturate(180%);
  -webkit-backdrop-filter: blur(48px) saturate(180%);
  box-shadow:
    0 0 0 1px rgba(124,58,237,0.07),
    0 4px 8px rgba(0,0,0,0.35),
    0 12px 24px rgba(0,0,0,0.45),
    0 40px 80px rgba(0,0,0,0.55),
    0 0 100px rgba(90,30,180,0.08),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -1px 0 rgba(0,0,0,0.35);
  animation: cardEntrance 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
  position: relative; overflow: hidden;
}

.card::before {
  content: "";
  position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: linear-gradient(145deg,rgba(124,58,237,0.05) 0%,transparent 40%,rgba(59,130,246,0.04) 100%);
}

/* Moving light reflection */
.card::after {
  content: "";
  position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.015) 50%,transparent 70%);
  animation: cardSheen 8s ease-in-out infinite;
}

@keyframes cardSheen {
  0%,100% { opacity:0; transform:translateX(-100%) skewX(-5deg); }
  15% { opacity:1; }
  40% { opacity:0; transform:translateX(200%) skewX(-5deg); }
}

/* Animated border beam */
.card-beam {
  position: absolute; inset: -1px; border-radius: var(--radius);
  background: conic-gradient(from var(--beam-angle,0deg),transparent 15%,rgba(124,58,237,0.7) 35%,rgba(99,102,241,0.5) 50%,rgba(59,130,246,0.4) 65%,transparent 80%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  padding: 1px;
  animation: beamRotate 5s linear infinite;
  opacity: 0.6;
}

@property --beam-angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes beamRotate { to { --beam-angle:360deg; } }

/* Second slower beam for depth */
.card-beam-2 {
  position: absolute; inset: -1px; border-radius: var(--radius);
  background: conic-gradient(from var(--beam2-angle,180deg),transparent 20%,rgba(59,130,246,0.25) 40%,transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  padding: 1px;
  animation: beam2Rotate 11s linear infinite;
  opacity: 0.4;
}

@property --beam2-angle { syntax:'<angle>'; initial-value:180deg; inherits:false; }
@keyframes beam2Rotate { to { --beam2-angle:540deg; } }

@keyframes cardEntrance {
  from { opacity:0; transform:translateY(48px) scale(0.94); filter:blur(6px); }
  to { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}
@keyframes cardOut {

  to { opacity:0; transform:scale(0.91) translateY(-24px); filter:blur(10px); }

/* ── LOGO SECTION ── */

/* Premium circular logo container */
.logo-circle {

/* ── FORM ── */
#mainForm { position:relative; z-index:1; }

.field { margin-bottom:1.2rem; position:relative; }
.field-label { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }

.input-wrap { position:relative; }

.input-icon {

}
.input-wrap:focus-within .input-icon { stroke:rgba(167,139,250,0.9); }

  background:rgba(255,255,255,0.025);

.eye-btn {

.eye-btn svg { width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none; }

/* ── STRENGTH BAR ── */
.strength-bar { display:flex; gap:4px; margin-top:8px; }
.strength-seg {
  flex:1; height:3px; border-radius:2px;
  background:rgba(255,255,255,0.055);

  overflow:hidden; position:relative;
}
.strength-seg.filled::after {
  content:""; position:absolute; inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,0.5),rgba(255,255,255,0));

@keyframes segShine { from{transform:translateX(-100%)} to{transform:translateX(200%)} }

.strength-info { display:flex; align-items:center; justify-content:flex-end; margin-top:5px; }
.strength-label { font-size:0.68rem; font-family:var(--font-mono); letter-spacing:0.05em; transition:color 0.4s; }

/* ── REQUIREMENT CHIPS ── */
.reqs { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
.req {
  display:inline-flex; align-items:center; gap:5px;
  font-size:0.69rem; font-family:var(--font-mono);
  padding:3px 9px; border-radius:6px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.055);
  color:rgba(255,255,255,0.22);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.req.met {
  background:rgba(16,185,129,0.07); border-color:rgba(16,185,129,0.25);
  color:rgba(52,211,153,0.92);
  box-shadow:0 0 8px rgba(16,185,129,0.1);
}
.req-icon { width:10px;height:10px;stroke:currentColor;stroke-width:2.5;fill:none;flex-shrink:0; }

/* ── MATCH HINT ── */
.match-hint {
  font-size:0.73rem; font-family:var(--font-mono); margin-top:7px;

.match-hint.ok { color:#34d399; }
.match-hint.err { color:#f87171; }
.match-hint svg { width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none;flex-shrink:0; }

/* ── BUTTON ── */
.btn-wrap { margin-top:0.7rem; position:relative; }

.btn {
  position:relative; z-index:1; width:100%; height:56px;
  background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 35%,#6366f1 70%,#4338ca 100%);
  background-size:200% 100%; background-position:left center;
  border:none; border-radius:13px;
  color:#fff; font-family:var(--font); font-size:0.95rem; font-weight:600;
  letter-spacing:0.025em; cursor:pointer; overflow:hidden;
  transition:background-position 0.55s ease, transform 0.2s ease, box-shadow 0.3s;
  box-shadow:0 1px 2px rgba(0,0,0,0.5),0 4px 14px rgba(90,30,200,0.35),inset 0 1px 0 rgba(255,255,255,0.14);
}

.btn:not(:disabled):hover {
  background-position:right center;
  transform:translateY(-2px);
  box-shadow:0 2px 6px rgba(0,0,0,0.5),0 10px 28px rgba(90,30,200,0.5),inset 0 1px 0 rgba(255,255,255,0.16);
}
.btn:not(:disabled):active { transform:scale(0.98) translateY(0); }
.btn:disabled { opacity:0.3; cursor:not-allowed; }

.btn::before {
  content:""; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);
  transform:translateX(-100%) skewX(-15deg); transition:none;
}
.btn:not(:disabled):hover::before { animation:btnShine 0.65s ease forwards; }
@keyframes btnShine { from{transform:translateX(-100%) skewX(-15deg)} to{transform:translateX(220%) skewX(-15deg)} }

.btn-ripple {
  position:absolute; border-radius:50%; background:rgba(255,255,255,0.22);
  pointer-events:none; transform:scale(0);
  animation:ripple 0.6s ease-out forwards;
}
@keyframes ripple { to{transform:scale(4);opacity:0;} }

.btn-content { display:flex;align-items:center;justify-content:center;gap:9px;position:relative;z-index:1; }
.btn-content svg { width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;transition:transform 0.3s; }
.btn:not(:disabled):hover .btn-content svg { transform:translateX(3px); }

.btn-label { transition:opacity 0.2s; }
.btn-spin { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s; }
.btn.loading .btn-label { opacity:0; }
.btn.loading .btn-spin { opacity:1; }
.spinner { width:22px;height:22px;border:2.5px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── BOTTOM ROW ── */
.bottom-row {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:1.4rem; padding-top:1.2rem;
  border-top:1px solid rgba(255,255,255,0.04);
  font-size:0.79rem; color:var(--text-dim);
  position:relative; z-index:1;
}
.bottom-row svg { width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0; }
.lock-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:0.66rem; font-family:var(--font-mono); letter-spacing:0.05em;
  color:rgba(16,185,129,0.55); border:1px solid rgba(16,185,129,0.13);
  padding:2px 7px; border-radius:5px; background:rgba(16,185,129,0.035);
}

/* ── SUCCESS CARD ── */
#successCard {
  display:none; flex-direction:column; align-items:center; text-align:center;
  padding:2.75rem 2.25rem 2.25rem;
  opacity:0; transform:translateY(24px) scale(0.97);
  transition:opacity 0.65s cubic-bezier(0.16,1,0.3,1),transform 0.65s cubic-bezier(0.16,1,0.3,1);
}
#successCard.visible { opacity:1; transform:translateY(0) scale(1); }

#confettiCanvas { position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;z-index:0; }

.success-ring {
  width:90px; height:90px; border-radius:50%;
  background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.22);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:1.5rem; position:relative; z-index:1;
  animation:successPop 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  box-shadow:0 0 50px rgba(16,185,129,0.14),0 0 100px rgba(16,185,129,0.06);
}
.success-ring::before {
  content:""; position:absolute; inset:-9px; border-radius:50%;
  border:1px solid rgba(16,185,129,0.09);
  animation:successPulse 3.5s ease-in-out infinite 1s;
}
.success-ring::after {
  content:""; position:absolute; inset:-18px; border-radius:50%;
  border:1px solid rgba(16,185,129,0.05);
  animation:successPulse 3.5s ease-in-out infinite 1.4s;
}
.success-ring svg { width:36px;height:36px;stroke:#10b981;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round; }
@keyframes successPop { from{transform:scale(0.4);opacity:0;} to{transform:scale(1);opacity:1;} }
@keyframes successPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.12);opacity:0.45;} }

.success-label { font-size:0.68rem;font-family:var(--font-mono);letter-spacing:0.16em;text-transform:uppercase;color:rgba(52,211,153,0.65);margin-bottom:0.7rem;position:relative;z-index:1;animation:fadeUp 0.5s ease 0.5s both; }
.success-title { font-family:var(--font-display);font-size:2rem;font-weight:800;letter-spacing:-0.04em;color:#f1f5f9;margin-bottom:0.55rem;position:relative;z-index:1;animation:fadeUp 0.5s ease 0.6s both; }
.success-desc { font-size:0.86rem;color:var(--text-muted);line-height:1.75;margin-bottom:1.75rem;position:relative;z-index:1;animation:fadeUp 0.5s ease 0.7s both; }

.success-btn {
  width:100%; height:54px;
  background:linear-gradient(135deg,#065f46,#059669,#10b981);
  border:none; border-radius:13px; color:#fff;
  font-family:var(--font); font-size:0.95rem; font-weight:600;
  letter-spacing:0.025em; cursor:pointer;
  position:relative; z-index:1; overflow:hidden;
  transition:transform 0.2s, box-shadow 0.3s;
  box-shadow:0 4px 22px rgba(16,185,129,0.3);
  animation:fadeUp 0.5s ease 0.8s both;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.success-btn:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(16,185,129,0.48); }
.success-btn svg { width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none; }

/* Success logo row */
.success-logo-row {
  display:flex; align-items:center; justify-content:center;
  gap:12px; margin-bottom:1.4rem; position:relative; z-index:1;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }

/* ── RESPONSIVE ── */
@media (max-width:540px) {
  .card, #successCard { padding:1.75rem 1.4rem 1.5rem; }

  .page-title { font-size:1.5rem; }
}
@media (max-width:380px) {
  .logo-circle { width:52px; height:52px; }
}
</style>

<body>

<div class="bg-noise"></div>
<div class="bg-aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>
<canvas id="bgCanvas"></canvas>
<div class="bg-grid"></div>
<div class="mouse-glow" id="mouseGlow"></div>
<div class="vignette"></div>

<div class="card-wrap">

  <!-- MAIN CARD -->
  <div class="card" id="mainCard">
    <div class="card-beam"></div>
    <div class="card-beam-2"></div>

    <!-- LOGO SECTION -->
    <div class="logo-section">
      <div class="logo-circle">

        </div>
      </div>

        <span class="logo-name">Locklet Pro</span>
        <span class="logo-sub">Secure Document Vault</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ICON + HEADING -->
    <div class="icon-section">
      <div class="icon-orbit">
        <div class="orbit-ring orbit-ring-2"></div>
        <div class="orbit-ring orbit-ring-1"></div>
        <div class="icon-core">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2.5"/>

          </svg>
        </div>
      </div>
      <h1 class="page-title">Create new password</h1>
      <p class="page-sub">Securing your vault access</p>
      <div class="email-chip">
        <svg viewBox="0 0 24 24" width="10" height="10" stroke="currentColor" stroke-width="2" fill="none">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        <span id="emailDisplay">your account</span>
      </div>
    </div>

    <!-- ERROR BANNER -->
    <div class="error-banner" id="errorBanner">
      <svg class="error-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span class="error-text"></span>
    </div>

    <!-- FORM -->
    <div id="mainForm">
      <div class="field">
        <div class="field-label"><label>New password</label></div>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>

            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-info"><span class="strength-label" id="strengthTag"></span></div>
        <div class="reqs">
          <div class="req" id="r-len"><svg class="req-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>8+ chars</div>
          <div class="req" id="r-up"><svg class="req-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Uppercase</div>
          <div class="req" id="r-num"><svg class="req-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Number</div>
          <div class="req" id="r-sym"><svg class="req-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Symbol</div>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><label>Confirm password</label></div>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <input type="password" id="confirmPass" placeholder="Re-enter your password"
                 oninput="onConfirm()" autocomplete="new-password">
          <button class="eye-btn" onclick="toggleVis('confirmPass',this)" type="button" aria-label="Toggle">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <div class="btn-wrap">
        <div class="btn-glow"></div>
        <button class="btn" id="submitBtn" onclick="handleSubmit(event)" disabled>
          <span class="btn-label btn-content">
            Reset password
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </span>
          <div class="btn-spin"><div class="spinner"></div></div>
        </button>
      </div>

      <div class="bottom-row">
        <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to sign in
        <span style="flex:1"></span>
        <div class="lock-badge">
          <svg viewBox="0 0 24 24" width="8" height="8" stroke="currentColor" stroke-width="2" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          TLS 1.3
        </div>
      </div>
    </div>
  </div>

  <!-- SUCCESS CARD -->
  <div class="card" id="successCard">
    <canvas id="confettiCanvas"></canvas>
    <div class="card-beam" style="background:conic-gradient(from var(--beam-angle,0deg),transparent 15%,rgba(16,185,129,0.7) 35%,rgba(52,211,153,0.5) 55%,transparent 75%);"></div>

    <div class="success-logo-row">
      <div class="logo-circle" style="animation-delay:-1s;">
        <div class="logo-inner">
          <img src="''' + f'data:image/jpeg;base64,{logo_b64}' + '''" alt="Locklet Pro">
        </div>
      </div>
      <div class="logo-text">
        <span class="logo-name">Locklet Pro</span>
        <span class="logo-sub">Secure Document Vault</span>
      </div>
    </div>

    <div class="success-ring">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <div class="success-label">vault secured</div>
    <h2 class="success-title">Password updated!</h2>
    <p class="success-desc">Your Locklet Pro vault has been secured.<br>Sign in to access your encrypted documents.</p>

    <button class="success-btn" onclick="void(0)">
      Sign in to Locklet Pro
      <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
    </button>
  </div>

</div>

<script>
/* ── MOUSE GLOW ── */
const glow = document.getElementById("mouseGlow");
let mx = window.innerWidth/2, my = window.innerHeight/2;
document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
(function animGlow() {
  glow.style.left = mx + "px"; glow.style.top = my + "px";
  requestAnimationFrame(animGlow);
})();

/* ── PARTICLE CANVAS ── */
(function() {
  const canvas = document.getElementById("bgCanvas");
  const ctx = canvas.getContext("2d");
  let W, H, pts = [], lines = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function mkPt() {
    return {
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.4+.3,
      a: Math.random()*.5+.08,
      hue: Math.random()<.65 ? 255+Math.random()*40 : 210+Math.random()*35,
    };
  }

  function init() {
    resize();
    pts = Array.from({length:100}, mkPt);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // Connections
    for(let i=0;i<pts.length;i++) {
      for(let j=i+1;j<pts.length;j++) {
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<110) {
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(120,60,255,${(1-d/110)*0.06})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
    // Dots
    for(const p of pts) {
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},75%,70%,${p.a})`;
      ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-5)p.x=W+5; if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5; if(p.y>H+5)p.y=-5;
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  init(); draw();
})();

/* ── PASSWORD LOGIC ── */
const LEVELS = [
  {segs:0,color:null,label:"",textColor:"rgba(255,255,255,0.18)"},
  {segs:1,color:"#ef4444",label:"Weak",textColor:"#f87171"},
  {segs:2,color:"#f59e0b",label:"Fair",textColor:"#fbbf24"},
  {segs:3,color:"#eab308",label:"Good",textColor:"#facc15"},
  {segs:4,color:"#10b981",label:"Strong",textColor:"#34d399"},
];

function onNewPass(v) {
  const reqs = { len:v.length>=8, up:/[A-Z]/.test(v), num:/[0-9]/.test(v), sym:/[^A-Za-z0-9]/.test(v) };
  const score = Object.values(reqs).filter(Boolean).length;
  ["len","up","num","sym"].forEach(k => document.getElementById("r-"+k).classList.toggle("met",reqs[k]));
  const lvl = LEVELS[score];
  for(let i=1;i<=4;i++) {
    const seg=document.getElementById("s"+i);
    const wasFilled=seg.style.background&&seg.style.background!=="rgba(255,255,255,0.055)";
    const nowFilled=i<=lvl.segs;
    seg.style.background=nowFilled?lvl.color:"rgba(255,255,255,0.055)";
    seg.style.boxShadow=nowFilled?`0 0 8px ${lvl.color}55`:none;
    if(nowFilled&&!wasFilled){seg.classList.remove("filled");void seg.offsetWidth;seg.classList.add("filled");}
    else if(!nowFilled)seg.classList.remove("filled");
  }
  const tag=document.getElementById("strengthTag");
  tag.textContent=lvl.label||""; tag.style.color=lvl.textColor;
  onConfirm(v); validate(reqs,score);
}

function onConfirm(aOverride) {
  const a=aOverride!==undefined?aOverride:document.getElementById("newPass").value;
  const b=document.getElementById("confirmPass").value;
  const hint=document.getElementById("matchHint");
  if(!b){hint.innerHTML="";hint.className="match-hint";}
  else if(a===b){hint.innerHTML=\'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Passwords match\';hint.className="match-hint ok";}
  else{hint.innerHTML=\'<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Passwords do not match\';hint.className="match-hint err";}
  const reqs={len:a.length>=8,up:/[A-Z]/.test(a),num:/[0-9]/.test(a),sym:/[^A-Za-z0-9]/.test(a)};
  validate(reqs,Object.values(reqs).filter(Boolean).length);
}

function validate(reqs,score) {
  const b=document.getElementById("confirmPass").value;
  const a=document.getElementById("newPass").value;
  document.getElementById("submitBtn").disabled=!(score===4&&a===b&&b.length>0);
}

/* ── RIPPLE ── */
function handleSubmit(e) {
  const btn=e.currentTarget;
  const rect=btn.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const r=document.createElement("span");
  r.className="btn-ripple";
  r.style.cssText=`left:${x}px;top:${y}px;width:${rect.width/2}px;height:${rect.width/2}px;margin-left:-${rect.width/4}px;margin-top:-${rect.width/4}px;`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(),650);
  submitReset();
}

/* ── EYE TOGGLE ── */
function toggleVis(id,btn) {
  const inp=document.getElementById(id);
  const isPass=inp.type==="password";
  inp.type=isPass?"text":"password";
  btn.querySelector("svg").innerHTML=isPass
    ?\'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>\'
    :\'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>\';
}

/* ── CONFETTI ── */
function startConfetti() {
  const canvas=document.getElementById("confettiCanvas");
  const ctx=canvas.getContext("2d");
  canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
  const COLORS=["#7c3aed","#a855f7","#3b82f6","#10b981","#06b6d4","#f59e0b","#ec4899","#f43f5e"];
  const pieces=Array.from({length:90},()=>({
    x:Math.random()*canvas.width, y:Math.random()*-canvas.height,
    w:Math.random()*8+3, h:Math.random()*4+2,
    r:Math.random()*Math.PI*2, rv:(Math.random()-.5)*.14,
    vy:Math.random()*2.8+1.5, vx:(Math.random()-.5)*1.8,
    color:COLORS[Math.floor(Math.random()*COLORS.length)], alpha:1,
  }));
  let frame=0;
  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    for(const p of pieces) {
      p.y+=p.vy; p.x+=p.vx; p.r+=p.rv;
      if(p.y<canvas.height+20)alive=true;
      if(p.y>canvas.height-70)p.alpha-=0.02;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    frame++;
    if(alive&&frame<350)requestAnimationFrame(loop);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  loop();
}
</script>
