<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Locklet Pro</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ✅ STEP 1: Replace with YOUR Firebase config
 const firebaseConfig = {
  apiKey: "____",
  authDomain: "locklet-pro.firebaseapp.com",
  projectId: "locklet-pro",
  storageBucket: "locklet-pro.firebasestorage.app",
  messagingSenderId: "___",
  appId: "1:544340578246:web:2f41e50a81b316ba352cc7",
  measurementId: "G-G519NJCMTY"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ✅ STEP 2: Read oobCode from URL params (Firebase sends this automatically)
  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get("oobCode");
  const email = params.get("email");

  window.addEventListener("DOMContentLoaded", async () => {
    // Show email in UI if available
    if (email) {
      const el = document.getElementById("emailDisplay");
      if (el) el.textContent = email;
    }

    // Verify the reset code is still valid
    if (!oobCode) {
      showError("Invalid or missing reset link. Please request a new password reset.");
      return;
    }

    try {
      const verifiedEmail = await verifyPasswordResetCode(auth, oobCode);
      const el = document.getElementById("emailDisplay");
      if (el) el.textContent = verifiedEmail;
    } catch (err) {
      showError("This reset link has expired or already been used. Please request a new one.");
    }
  });

  // ✅ STEP 3: Handle form submission
  window.submitReset = async function () {
    const newPass = document.getElementById("newPass").value;
    const confirmPass = document.getElementById("confirmPass").value;

    if (newPass !== confirmPass) return;

    const btn = document.getElementById("submitBtn");
    btn.classList.add("loading");
    btn.disabled = true;

    try {
      await confirmPasswordReset(auth, oobCode, newPass);
      showSuccess();
    } catch (err) {
      btn.classList.remove("loading");
      btn.disabled = false;
      let msg = "Something went wrong. Please try again.";
      if (err.code === "auth/expired-action-code") msg = "This reset link has expired. Please request a new one.";
      if (err.code === "auth/invalid-action-code") msg = "Invalid reset link. Please request a new one.";
      if (err.code === "auth/weak-password") msg = "Password is too weak. Please choose a stronger password.";
      showError(msg);
    }
  };

  function showError(msg) {
    const el = document.getElementById("errorBanner");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("mainForm").style.opacity = "0.5";
    document.getElementById("mainForm").style.pointerEvents = "none";
  }

  function showSuccess() {
    document.getElementById("mainCard").style.animation = "cardOut 0.4s ease forwards";
    setTimeout(() => {
      document.getElementById("mainCard").style.display = "none";
      const sc = document.getElementById("successCard");
      sc.style.display = "flex";
      sc.style.animation = "cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards";
    }, 400);
  }
</script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    --purple-dim: rgba(120,60,255,0.15);
    --purple-border: rgba(120,60,255,0.35);
    --surface: rgba(255,255,255,0.035);
    --border: rgba(255,255,255,0.09);
    --text: #fff;
    --muted: rgba(255,255,255,0.45);
    --green: #34d399;
    --red: #f87171;
  }

  html, body {
    min-height: 100vh;
    background: #050508;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 2rem 1rem;
  }

  /* ── Background FX ── */
  .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(90px); animation: drift 10s ease-in-out infinite;
  }
  .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(120,60,255,0.16) 0%, transparent 70%); top: -150px; left: -150px; }
  .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,180,255,0.10) 0%, transparent 70%); bottom: -100px; right: -100px; animation-delay: -5s; }
  .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(200,50,255,0.08) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -2.5s; }
  @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(15px,-20px) scale(1.04); } 66% { transform: translate(-10px,15px) scale(0.97); } }

  .grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(120,60,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(120,60,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .vignette {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,5,8,0.7) 100%);
  }

  /* ── Cards ── */
  .card-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 460px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2.75rem 2.75rem 2.25rem;
    backdrop-filter: blur(24px);
    box-shadow:
      0 0 0 1px rgba(120,60,255,0.08),
      0 40px 80px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(255,255,255,0.07);
    animation: cardIn 0.75s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(28px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes cardOut { from { opacity:1; transform:scale(1); } to { opacity:0; transform:scale(0.95); } }

  /* ── Logo ── */
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800;
    color: #fff; letter-spacing: -0.02em; text-decoration: none;
    margin-bottom: 2rem;
  }
  .logo-box {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, #6d28d9, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 22px rgba(120,60,255,0.55), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .logo-text span { background: linear-gradient(90deg,#c084fc,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* ── Icon lockup ── */
  .icon-ring {
    width: 68px; height: 68px; margin: 0 auto 1.25rem;
    border-radius: 22px;
    background: rgba(120,60,255,0.1);
    border: 1px solid rgba(120,60,255,0.28);
    display: flex; align-items: center; justify-content: center;
    animation: pulse 3.5s ease-in-out infinite;
    position: relative;
  }
  .icon-ring::after {
    content: ''; position: absolute; inset: -6px; border-radius: 28px;
    border: 1px solid rgba(120,60,255,0.12);
    animation: pulse 3.5s ease-in-out infinite 0.5s;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(120,60,255,0.3); } 50% { box-shadow: 0 0 0 10px rgba(120,60,255,0); } }
  .icon-ring svg { width: 30px; height: 30px; stroke: #a78bfa; stroke-width: 1.7; fill: none; }

  /* ── Typography ── */
  .page-title {
    font-family: 'Syne', sans-serif; font-size: 1.65rem; font-weight: 700;
    color: #fff; text-align: center; letter-spacing: -0.025em; margin-bottom: 0.35rem;
  }
  .page-sub {
    font-size: 0.875rem; color: var(--muted); text-align: center;
    line-height: 1.55; margin-bottom: 2rem;
  }
  .page-sub strong { color: rgba(167,139,250,0.9); font-weight: 500; }

  /* ── Error Banner ── */
  .error-banner {
    display: none;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    color: #fca5a5;
    text-align: center;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  /* ── Form fields ── */
  .field { margin-bottom: 1.25rem; }
  label {
    display: block; font-size: 0.76rem; font-weight: 500;
    color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.09em;
    margin-bottom: 0.5rem;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: rgba(167,139,250,0.45); stroke-width: 1.8; fill: none;
    pointer-events: none; transition: stroke 0.3s;
  }
  .input-wrap:focus-within .input-icon { stroke: rgba(167,139,250,0.9); }

  input[type="password"], input[type="text"] {
    width: 100%; height: 50px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 13px;
    color: #fff; font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
    padding: 0 48px 0 44px;
    outline: none; transition: all 0.3s;
    caret-color: #a78bfa;
  }
  input:focus {
    border-color: rgba(120,60,255,0.55);
    background: rgba(120,60,255,0.05);
    box-shadow: 0 0 0 3px rgba(120,60,255,0.14), 0 0 24px rgba(120,60,255,0.07);
  }
  input::placeholder { color: rgba(255,255,255,0.18); }

  .eye-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 5px;
    color: rgba(255,255,255,0.28); transition: color 0.2s;
    display: flex; align-items: center;
  }
  .eye-btn:hover { color: rgba(167,139,250,0.85); }
  .eye-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; }

  /* ── Strength ── */
  .strength-row { display: flex; gap: 4px; margin-top: 8px; }
  .strength-seg {
    flex: 1; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: background 0.4s ease;
  }
  .strength-meta { display: flex; justify-content: flex-end; margin-top: 5px; }
  .strength-tag { font-size: 0.72rem; }

  /* ── Requirements ── */
  .reqs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .req {
    font-size: 0.72rem; padding: 3px 9px; border-radius: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3); transition: all 0.3s;
    display: flex; align-items: center; gap: 5px;
  }
  .req.met { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.28); color: #34d399; }
  .req-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* ── Match hint ── */
  .match-hint { font-size: 0.78rem; margin-top: 7px; min-height: 18px; transition: all 0.3s; }
  .match-hint.ok { color: #34d399; }
  .match-hint.err { color: #f87171; }

  /* ── Submit button ── */
  .btn {
    width: 100%; height: 54px; margin-top: 0.5rem;
    background: linear-gradient(135deg, #6d28d9 0%, #a855f7 50%, #7c3aed 100%);
    background-size: 200% 100%; background-position: left center;
    border: none; border-radius: 14px;
    color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background-position 0.4s, box-shadow 0.3s, transform 0.15s;
    box-shadow: 0 0 24px rgba(120,60,255,0.28), 0 4px 16px rgba(0,0,0,0.4);
  }
  .btn:not(:disabled):hover {
    background-position: right center;
    box-shadow: 0 0 40px rgba(120,60,255,0.5), 0 4px 20px rgba(0,0,0,0.45);
    transform: translateY(-1px);
  }
  .btn:not(:disabled):active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: translateX(-100%); transition: transform 0.65s;
  }
  .btn:not(:disabled):hover::before { transform: translateX(100%); }
  .btn-label { transition: opacity 0.2s; }
  .btn-spin { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .btn.loading .btn-label { opacity: 0; }
  .btn.loading .btn-spin { opacity: 1; }
  .spinner { width: 22px; height: 22px; border: 2.5px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.75rem 0 1.25rem; }

  /* ── Non-clickable back link ── */
  .back-non-link {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 0.85rem; color: rgba(255,255,255,0.25);
    cursor: default; user-select: none;
  }
  .back-non-link svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* ── Success state ── */
  #successCard {
    display: none; flex-direction: column; align-items: center;
    text-align: center; padding: 2.75rem 2.75rem 2.25rem;
  }
  .success-glow {
    width: 80px; height: 80px; margin-bottom: 1.5rem;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 36px rgba(52,211,153,0.18);
    animation: successPop 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes successPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-glow svg { width: 34px; height: 34px; stroke: #34d399; stroke-width: 2; fill: none; }
  .success-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
  .success-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.65; margin-bottom: 2rem; }
  .success-btn {
    width: 100%; height: 52px;
    background: linear-gradient(135deg, #6d28d9, #a855f7);
    border: none; border-radius: 14px;
    color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(120,60,255,0.28);
    transition: box-shadow 0.3s, transform 0.15s;
  }
  .success-btn:hover { box-shadow: 0 0 40px rgba(120,60,255,0.5); transform: translateY(-1px); }
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid"></div>
<div class="vignette"></div>

<div class="card-wrap">

  <!-- Main reset card -->
  <div class="card" id="mainCard">
    <a class="logo" href="#">
      <div class="logo-box">🔒</div>
      <div class="logo-text">Locklet<span>Pro</span></div>
    </a>

    <div style="text-align:center">
      <div class="icon-ring">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h1 class="page-title">Create new password</h1>
      <p class="page-sub">Securing account for<br><strong id="emailDisplay">your account</strong></p>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div id="mainForm">
      <div class="field">
        <label>New password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="newPass" placeholder="Enter new password" oninput="onNewPass(this.value)" autocomplete="new-password">
          <button class="eye-btn" onclick="toggleVis('newPass',this)" type="button" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-row">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-meta">
          <span class="strength-tag" id="strengthTag" style="color:var(--muted)"></span>
        </div>
        <div class="reqs">
          <div class="req" id="r-len"><div class="req-dot"></div>8+ chars</div>
          <div class="req" id="r-up"><div class="req-dot"></div>Uppercase</div>
          <div class="req" id="r-num"><div class="req-dot"></div>Number</div>
          <div class="req" id="r-sym"><div class="req-dot"></div>Symbol</div>
        </div>
      </div>

      <div class="field">
        <label>Confirm password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <input type="password" id="confirmPass" placeholder="Re-enter your password" oninput="onConfirm()" autocomplete="new-password">
          <button class="eye-btn" onclick="toggleVis('confirmPass',this)" type="button" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <button class="btn" id="submitBtn" onclick="submitReset()" disabled>
        <span class="btn-label">Reset password</span>
        <div class="btn-spin"><div class="spinner"></div></div>
      </button>

      <div class="divider"></div>

      <div class="back-non-link">
        <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to sign in
      </div>
    </div>
  </div>

  <!-- Success card -->
  <div class="card" id="successCard" style="display:none; flex-direction:column; align-items:center; text-align:center; padding:2.75rem 2.75rem 2.25rem;">
    <a class="logo" href="#" style="margin-bottom:1.5rem">
      <div class="logo-box">🔒</div>
      <div class="logo-text">Locklet<span>Pro</span></div>
    </a>
    <div class="success-glow">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2 class="success-title">Password updated!</h2>
    <p class="success-desc">Your Locklet Pro password has been<br>successfully reset. You can now sign<br>in with your new credentials.</p>
    <button class="success-btn" onclick="void(0)">Sign in to Locklet Pro →</button>
  </div>

</div>

<script>
  const LEVELS = [
    { segs: 0, color: null, label: '', textColor: 'var(--muted)' },
    { segs: 1, color: '#f87171', label: 'Weak', textColor: '#f87171' },
    { segs: 2, color: '#fb923c', label: 'Fair', textColor: '#fb923c' },
    { segs: 3, color: '#facc15', label: 'Good', textColor: '#facc15' },
    { segs: 4, color: '#34d399', label: 'Strong', textColor: '#34d399' },
  ];

  function onNewPass(v) {
    const reqs = {
      len: v.length >= 8,
      up: /[A-Z]/.test(v),
      num: /[0-9]/.test(v),
      sym: /[^A-Za-z0-9]/.test(v),
    };
    const score = Object.values(reqs).filter(Boolean).length;

    ['len','up','num','sym'].forEach(k => {
      document.getElementById('r-'+k).classList.toggle('met', reqs[k]);
    });

    const lvl = LEVELS[score];
    for (let i = 1; i <= 4; i++) {
      const seg = document.getElementById('s'+i);
      seg.style.background = i <= lvl.segs ? lvl.color : 'rgba(255,255,255,0.08)';
    }
    const tag = document.getElementById('strengthTag');
    tag.textContent = lvl.label ? 'Strength: ' + lvl.label : '';
    tag.style.color = lvl.textColor;

    onConfirm();
    validate(reqs, score);
  }

  function onConfirm() {
    const a = document.getElementById('newPass').value;
    const b = document.getElementById('confirmPass').value;
    const hint = document.getElementById('matchHint');
    if (!b) { hint.textContent = ''; hint.className = 'match-hint'; }
    else if (a === b) { hint.textContent = '✓ Passwords match'; hint.className = 'match-hint ok'; }
    else { hint.textContent = '✗ Passwords do not match'; hint.className = 'match-hint err'; }
    const reqs = {
      len: a.length >= 8,
      up: /[A-Z]/.test(a),
      num: /[0-9]/.test(a),
      sym: /[^A-Za-z0-9]/.test(a),
    };
    validate(reqs, Object.values(reqs).filter(Boolean).length);
  }

  function validate(reqs, score) {
    const b = document.getElementById('confirmPass').value;
    const a = document.getElementById('newPass').value;
    const ok = score === 4 && a === b && b.length > 0;
    document.getElementById('submitBtn').disabled = !ok;
  }

  function toggleVis(id, btn) {
    const inp = document.getElementById(id);
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = isPass
